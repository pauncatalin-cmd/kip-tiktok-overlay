<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIP Overlay Promo Only</title>

<style>
:root{
    --bar-width:1330px;
    --bar-height:70px;
    --blue:#00aaff;
    --cyan:#00eaff;
    --green:#39ff14;
    --red:#ff1744;
    --discord:#5865F2;
}

*{box-sizing:border-box;}

body{
    margin:0;
    width:100vw;
    height:100vh;
    overflow:hidden;
    background:transparent;
    font-family:Arial,Helvetica,sans-serif;
}

.full-overlay{
    position:fixed;
    left:50%;
    bottom:30px;
    transform:translateX(-50%);
    width:var(--bar-width);
    height:var(--bar-height);
    overflow:visible;
    background:transparent;
}

.mega-bar{
    position:absolute;
    inset:0;
    width:var(--bar-width);
    height:var(--bar-height);
    overflow:visible;
    background:transparent;
}

.row{
    position:absolute;
    left:0;
    top:0;
    width:var(--bar-width);
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:visible;
}

.slide{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:0 34px;
    overflow:visible;
}

.slide.entering .char{
    animation:charInSmooth .95s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay:calc(var(--i) * .026s);
}

.slide.active .char{
    opacity:1;
    transform:translateY(0) translateX(0) rotateZ(0deg) scale(1);
    filter:blur(0);
}

.slide.active .text{
    animation:textBoomPulse 2.4s ease-in-out infinite;
}

.slide.leaving{
    animation:slideSoftExit .95s cubic-bezier(.16,1,.3,1) forwards;
}

.slide.leaving .char{
    animation:charOutSmooth .9s cubic-bezier(.16,1,.3,1) forwards;
    animation-delay:calc(var(--i) * .012s);
}

@keyframes charInSmooth{
    0%{
        opacity:0;
        transform:translateY(28px) translateX(var(--enter-x)) rotateZ(var(--enter-r)) scale(.74);
        filter:blur(9px);
    }
    55%{
        opacity:1;
        transform:translateY(-4px) translateX(0) rotateZ(3deg) scale(1.08);
        filter:blur(0);
    }
    100%{
        opacity:1;
        transform:translateY(0) translateX(0) rotateZ(0deg) scale(1);
        filter:blur(0);
    }
}

@keyframes charOutSmooth{
    0%{
        opacity:1;
        transform:translateY(0) translateX(0) rotateZ(0deg) scale(1);
        filter:blur(0);
    }
    100%{
        opacity:0;
        transform:translateY(-34px) translateX(calc(var(--fly-x) * 1.6)) rotateZ(calc(var(--fly-r) * 1.1)) scale(.78);
        filter:blur(8px);
    }
}

@keyframes slideSoftExit{
    0%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(.97);}
}

@keyframes textBoomPulse{
    0%,100%{transform:scale(1); filter:brightness(1);}
    50%{transform:scale(1.035); filter:brightness(1.25);}
}

.icon{
    font-size:36px;
    flex-shrink:0;
    z-index:5;
    filter:drop-shadow(0 0 12px var(--cyan));
    animation:logoFloat 2.4s ease-in-out infinite;
}

@keyframes logoFloat{
    0%,100%{transform:translateY(0) scale(1);}
    50%{transform:translateY(-4px) scale(1.06);}
}

.text{
    display:inline-flex;
    white-space:nowrap;
    position:relative;
    z-index:6;
    transform-origin:center;
}

.label{
    color:white;
    font-size:22px;
    font-weight:1000;
    letter-spacing:.4px;
    text-shadow:
        0 0 7px white,
        0 0 16px var(--cyan);
}

.main{
    color:var(--blue);
    font-size:38px;
    font-weight:1000;
    line-height:1;
    text-shadow:
        0 0 10px var(--blue),
        0 0 24px rgba(0,170,255,.95),
        0 0 38px rgba(0,234,255,.65);
}

.small{
    color:white;
    font-size:18px;
    font-weight:900;
    text-shadow:
        0 0 7px white,
        0 0 16px rgba(0,234,255,.65);
}

.green{
    color:var(--green);
    text-shadow:
        0 0 10px var(--green),
        0 0 26px rgba(57,255,20,.9);
}

.red{
    color:var(--red);
    text-shadow:
        0 0 10px var(--red),
        0 0 26px rgba(255,23,68,.9);
}

.discord{
    color:var(--discord);
    text-shadow:
        0 0 10px var(--discord),
        0 0 26px rgba(88,101,242,1);
}

.char{
    display:inline-block;
    opacity:0;
    transform-origin:center;
    will-change:transform, opacity, filter;
}

.spark{
    position:absolute;
    width:4px;
    height:4px;
    border-radius:50%;
    background:var(--cyan);
    box-shadow:
        0 0 8px var(--cyan),
        0 0 18px rgba(0,234,255,.9);
    opacity:0;
    animation:sparkMove 2.2s ease-in-out infinite;
    animation-delay:var(--spark-delay);
    z-index:2;
}

@keyframes sparkMove{
    0%{opacity:0; transform:translateY(8px) scale(.4);}
    35%{opacity:1; transform:translateY(-4px) scale(1.2);}
    100%{opacity:0; transform:translateY(-20px) scale(.5);}
}

.pill{
    position:relative;
    z-index:6;
    padding:5px 11px;
    border-radius:999px;
    background:var(--green);
    color:#061006;
    font-size:15px;
    font-weight:1000;
    white-space:nowrap;
    box-shadow:
        0 0 12px var(--green),
        0 0 24px rgba(57,255,20,.8);
    animation:pillPulse 1.8s ease-in-out infinite;
}

@keyframes pillPulse{
    0%,100%{transform:scale(1); filter:brightness(1);}
    50%{transform:scale(1.04); filter:brightness(1.18);}
}

.platforms{
    display:flex;
    gap:7px;
    z-index:6;
}

.platform{
    width:32px;
    height:32px;
    border-radius:10px;
    display:grid;
    place-items:center;
    background:rgba(0,0,0,.25);
    border:2px solid var(--cyan);
    color:white;
    font-size:17px;
    font-weight:1000;
    box-shadow:0 0 12px rgba(0,234,255,.9);
    animation:platformBounce 1.8s ease-in-out infinite;
}

.platform.kick{
    border-color:var(--green);
    color:var(--green);
    box-shadow:0 0 12px rgba(57,255,20,.9);
}

.platform.yt{
    border-color:var(--red);
    color:var(--red);
    box-shadow:0 0 12px rgba(255,23,68,.9);
}

@keyframes platformBounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-3px);}
}

.discord-logo{
    width:40px;
    height:40px;
    display:grid;
    place-items:center;
    border-radius:14px;
    background:rgba(88,101,242,.18);
    box-shadow:
        0 0 14px rgba(88,101,242,1),
        0 0 28px rgba(88,101,242,.75);
    animation:logoFloat 2.4s ease-in-out infinite;
    z-index:6;
}

.discord-logo svg{
    width:32px;
    height:32px;
    filter:drop-shadow(0 0 8px rgba(88,101,242,1));
}
</style>
</head>

<body>

<div class="full-overlay">
    <div class="mega-bar">
        <div class="row" id="promoRow"></div>
    </div>
</div>

<script>
const slideTime = 9500;
const flyTime = 1100;
const overlapTime = 420;

const promoItems = [
    {icon:"🛒", label:"B-ZONE", main:"SHOP", small:"INTRĂ PE SHOP"},
    {icon:"🏷️", label:"PROMO CODE", main:"KIP", mainClass:"green", small:"LA CHECKOUT"},
    {icon:"🌐", label:"LINK SHOP", main:"GTA5.RO/SHOP"},
    {icon:"🎁", label:"ADAUGĂ", main:"REFERRAL 13", mainClass:"green", pill:"MAȘINĂ + GEANTĂ"},
    {icon:"🔴", label:"LIVE PE", main:"TIKTOK", mainClass:"red", small:"KICK & YOUTUBE", platforms:true},
    {discord:true, label:"DISCORD", labelClass:"discord", main:"KIP Community", mainClass:"green", pill:"LINK ÎN BIO"}
];

let promoIndex = 0;

function textSpans(text, className){
    return `<span class="text ${className}">` + [...text].map((char, index) => {
        const center = (text.length - 1) / 2;
        const distance = index - center;
        const flyX = distance * 4;
        const flyR = distance * 2.6;
        const enterX = distance * -2.4;
        const enterR = distance * -1.4;

        return `<span class="char" style="--i:${index}; --fly-x:${flyX}px; --fly-r:${flyR}deg; --enter-x:${enterX}px; --enter-r:${enterR}deg;">${char === " " ? "&nbsp;" : char}</span>`;
    }).join("") + `</span>`;
}

function sparkles(){
    let html = "";
    for(let i = 0; i < 26; i++){
        const left = 80 + Math.random() * 1170;
        const top = 8 + Math.random() * 52;
        const delay = Math.random() * 2;
        html += `<span class="spark" style="left:${left}px; top:${top}px; --spark-delay:${delay}s;"></span>`;
    }
    return html;
}

function discordLogo(){
    return `
    <div class="discord-logo">
        <svg viewBox="0 0 245 240" xmlns="http://www.w3.org/2000/svg">
            <path fill="#5865F2" d="M104.4 103.9c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.3-5 10.2-11.1.1-6.1-4.5-11.1-10.2-11.1zm36.2 0c-5.7 0-10.2 5-10.2 11.1s4.6 11.1 10.2 11.1c5.7 0 10.3-5 10.2-11.1.1-6.1-4.5-11.1-10.2-11.1z"/>
            <path fill="#5865F2" d="M189.5 20h-134C44.2 20 35 29.2 35 40.6v135.2c0 11.4 9.2 20.6 20.5 20.6h113.4l-5.3-18.5 12.8 11.9 12.1 11.2L210 220V40.6c0-11.4-9.2-20.6-20.5-20.6zm-38.6 130.6s-3.6-4.3-6.6-8.1c13.1-3.7 18.1-11.9 18.1-11.9-4.1 2.7-8 4.6-11.5 5.9-5 2.1-9.8 3.5-14.5 4.3-9.6 1.8-18.4 1.3-25.9-.1-5.7-1.1-10.6-2.7-14.7-4.3-2.3-.9-4.8-2-7.3-3.4-.3-.2-.6-.3-.9-.5-.2-.1-.3-.2-.4-.3-1.8-1-2.8-1.7-2.8-1.7s4.8 8 17.5 11.8c-3 3.8-6.7 8.3-6.7 8.3-22.1-.7-30.5-15.2-30.5-15.2 0-32.2 14.4-58.3 14.4-58.3 14.4-10.8 28.1-10.5 28.1-10.5l1 1.2c-18 5.2-26.3 13.1-26.3 13.1s2.2-1.2 5.9-2.9c10.7-4.7 19.2-6 22.7-6.3.6-.1 1.1-.2 1.7-.2 6.1-.8 13-1 20.2-.2 9.5 1.1 19.7 3.9 30.1 9.6 0 0-7.9-7.5-24.9-12.7l1.4-1.6s13.7-.3 28.1 10.5c0 0 14.4 26.1 14.4 58.3 0 0-8.5 14.5-30.6 15.2z"/>
        </svg>
    </div>`;
}

function buildSlide(item){
    let html = `<div class="slide entering">`;
    html += sparkles();

    if(item.discord){
        html += discordLogo();
    } else if(item.icon){
        html += `<div class="icon">${item.icon}</div>`;
    }

    html += textSpans(item.label, `label ${item.labelClass || ""}`);
    html += textSpans(item.main, `main ${item.mainClass || ""}`);

    if(item.small){
        html += textSpans(item.small, "small");
    }

    if(item.pill){
        html += `<div class="pill">${item.pill}</div>`;
    }

    if(item.platforms){
        html += `
        <div class="platforms">
            <div class="platform">♪</div>
            <div class="platform kick">K</div>
            <div class="platform yt">▶</div>
        </div>`;
    }

    html += `</div>`;
    return html;
}

function activateSlide(slide){
    setTimeout(() => {
        if(slide){
            slide.classList.add("active");
        }
    }, 1100);
}

function switchSlide(){
    const row = document.getElementById("promoRow");
    const oldSlide = row.querySelector(".slide:not(.leaving)");

    if(oldSlide){
        oldSlide.classList.remove("active");
        oldSlide.classList.add("leaving");

        setTimeout(() => {
            row.insertAdjacentHTML("beforeend", buildSlide(promoItems[promoIndex]));
            const newSlide = row.querySelector(".slide.entering:not(.leaving)");
            activateSlide(newSlide);
        }, overlapTime);

        setTimeout(() => {
            if(oldSlide.parentNode){
                oldSlide.remove();
            }
        }, flyTime + 350);
    } else {
        row.insertAdjacentHTML("beforeend", buildSlide(promoItems[promoIndex]));
        const newSlide = row.querySelector(".slide.entering:not(.leaving)");
        activateSlide(newSlide);
    }
}

function start(){
    switchSlide();

    setInterval(() => {
        promoIndex = (promoIndex + 1) % promoItems.length;
        switchSlide();
    }, slideTime);
}

start();
</script>

</body>
</html>
